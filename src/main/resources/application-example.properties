# ============================================================
# application-example.properties
# Copy this file to application-local.properties and fill in
# your own values. NEVER commit the local file.
# ============================================================

# Application name
spring.application.name=geops-api

# CORS — set these to your actual frontend origins
frontend.url=http://localhost:4200
prod.frontend.url=https://your-frontend.vercel.app
prod.api.url=https://your-api.up.railway.app/

# DataSource — use env vars in production
# FORMAT: jdbc:mysql://<host>:<port>/<database>?useSSL=true&serverTimezone=UTC&...
spring.datasource.url=jdbc:mysql://localhost:3306/geops?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=your_db_user
spring.datasource.password=your_db_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=com.geopslabs.geops.api.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# OpenAPI docs (resolved from pom.xml at build time — leave as-is)
documentation.application.description=@project.description@
documentation.application.version=@project.version@

# Tomcat header size limits
server.max-http-request-header-size=128KB


# JWT — use a long random secret (256+ bits). NEVER hardcode in production.
# Generate with: openssl rand -base64 64
authorization.jwt.secret=REPLACE_WITH_YOUR_SECRET_AT_LEAST_256_BITS_LONG
authorization.jwt.expiration.days=7
